name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-and-push:
    name: Build and Push to ECR
    uses: chao7150/actions/.github/workflows/ecr-push.yml@main
    permissions:
      id-token: write
      contents: read
    secrets:
      aws_role_to_assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      dispatch_token: ${{ secrets.DISPATCH_TOKEN }}
    with:
      aws_region: ap-northeast-1
      ecr_repository: watch-duty-manager
      docker_file: container/Containerfile

  notify-and-tag:
    name: Notify and Tag
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits since last deploy
        id: get-commits
        run: |
          LAST_TAG="deployed/latest"
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log --pretty=format:"%s" $LAST_TAG..HEAD | head -20)
          else
            COMMITS="Initial deployment"
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="No changes (re-deploy or manually triggered)"
          fi

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_STATUS: ${{ needs.docker-build-and-push.result }}
          IMAGE_TAG: ${{ github.sha }}
          COMMIT_MESSAGES: ${{ steps.get-commits.outputs.commits }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping notification."
            exit 0
          fi

          if [ "$BUILD_STATUS" = "success" ]; then
            STATUS_MESSAGE="✅ CI/CD success"
            COLOR="3066993"
          else
            STATUS_MESSAGE="❌ CI/CD failed"
            COLOR="15158332"
          fi

          FORMATTED_COMMITS=$(echo "$COMMIT_MESSAGES" | sed 's/^/• /' | sed ':a;N;$!ba;s/\n/\\n/g')

          DISCORD_JSON=$(cat <<EOF
          {
            "embeds": [{
              "title": "watch-duty-manager deployment",
              "color": $COLOR,
              "fields": [
                {
                  "name": "Status",
                  "value": "$STATUS_MESSAGE",
                  "inline": true
                },
                {
                  "name": "Commit",
                  "value": "\`${IMAGE_TAG:0:7}\`",
                  "inline": true
                },
                {
                  "name": "Changes",
                  "value": "$FORMATTED_COMMITS",
                  "inline": false
                }
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
            }]
          }
          EOF
          )

          curl -X POST -H 'Content-type: application/json' \
            --data "$DISCORD_JSON" \
            "$DISCORD_WEBHOOK_URL"

      - name: Tag successful deploy
        if: ${{ needs.docker-build-and-push.result == 'success' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f deployed/latest
          git push origin +deployed/latest

